<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- LOCK ZOOM & MOBILE OPTIMIZATION -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika • Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        html, body {
            overflow-x: hidden; /* LOCK horizontal scroll */
            min-height: 100vh;
        }

        body {
            background-color: #0f0f0f;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* Mobile default */
        body {
            background-image: url('https://files.catbox.moe/3t4o2o.jpg');
        }

        /* Desktop */
        @media (min-width: 768px) {
            body {
                background-image: url('https://files.catbox.moe/9h7wpt.jpg');
            }
        }

        .glass {
            background: rgba(15, 15, 30, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(192, 38, 211, 0.2);
        }
        .neon-glow {
            text-shadow: 0 0 15px #c026d3, 0 0 30px #a855f7;
        }
        .social-card {
            transition: all 0.5s cubic-bezier(0.23, 1.0, 0.32, 1.0);
        }

        /* PROFILE PHOTO FIX - PASTI MUNcul */
        .profile-container {
            width: 7rem;
            height: 7rem;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .profile-container:hover {
            transform: scale(1.08) rotate(3deg);
        }
        .profile-container img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            display: block;
            border-radius: 9999px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="max-w-md w-full mx-auto">
        <!-- Profile -->
        <div class="text-center mb-12">
            <div class="mx-auto rounded-full overflow-hidden border-4 border-purple-500 shadow-2xl shadow-purple-500/50 profile-container">
                <img 
                    src="https://files.catbox.moe/b5c4cm.jpg" 
                    alt="Profile Dika" 
                >
            </div>
            <h1 class="text-5xl font-bold mt-6 tracking-tighter neon-glow" style="font-family: 'Space Grotesk', sans-serif;">DIKA</h1>
            <p class="text-purple-300 mt-1 text-lg">execuidor • team</p>
        </div>

        <!-- Links -->
        <div class="space-y-5">
            <!-- Instagram -->
            <a href="https://www.instagram.com/obitoesquado" target="_blank" class="social-card glass rounded-3xl p-5 flex items-center gap-5 group" data-tilt data-tilt-glare="true" data-tilt-max-glare="0.6">
                <div class="w-12 h-12 bg-gradient-to-tr from-[#f56040] via-[#c13584] to-[#833ab4] rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="flex-1">
                    <div class="font-semibold text-xl group-hover:text-pink-400 transition-colors">Instagram</div>
                    <div class="text-zinc-400 text-sm">@obitoesquado</div>
                </div>
                <i class="fa-solid fa-arrow-right text-purple-400 group-hover:translate-x-2 transition-transform"></i>
            </a>

            <!-- Threads -->
            <a href="https://www.threads.net/@obitoesquado" target="_blank" class="social-card glass rounded-3xl p-5 flex items-center gap-5 group" data-tilt>
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-3xl border border-white/30 flex-shrink-0">
                    <i class="fa-brands fa-threads"></i>
                </div>
                <div class="flex-1">
                    <div class="font-semibold text-xl">Threads</div>
                    <div class="text-zinc-400 text-sm">@obitoesquado</div>
                </div>
                <i class="fa-solid fa-arrow-right text-purple-400 group-hover:translate-x-2 transition-transform"></i>
            </a>

            <!-- X -->
            <a href="https://x.com/onedickaa" target="_blank" class="social-card glass rounded-3xl p-5 flex items-center gap-5 group" data-tilt>
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">
                    <i class="fa-brands fa-x-twitter"></i>
                </div>
                <div class="flex-1">
                    <div class="font-semibold text-xl">X / Twitter</div>
                    <div class="text-zinc-400 text-sm">@onedickaa</div>
                </div>
                <i class="fa-solid fa-arrow-right text-purple-400 group-hover:translate-x-2 transition-transform"></i>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@dikasecx" target="_blank" class="social-card glass rounded-3xl p-5 flex items-center gap-5 group" data-tilt>
                <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">
                    <i class="fa-brands fa-tiktok"></i>
                </div>
                <div class="flex-1">
                    <div class="font-semibold text-xl">TikTok</div>
                    <div class="text-zinc-400 text-sm">@dikasecx</div>
                </div>
                <i class="fa-solid fa-arrow-right text-purple-400 group-hover:translate-x-2 transition-transform"></i>
            </a>

            <!-- Telegram -->
            <a href="https://t.me/porqueen" target="_blank" class="social-card glass rounded-3xl p-5 flex items-center gap-5 group" data-tilt>
                <div class="w-12 h-12 bg-[#229ED9] rounded-2xl flex items-center justify-center text-3xl text-white flex-shrink-0">
                    <i class="fa-brands fa-telegram"></i>
                </div>
                <div class="flex-1">
                    <div class="font-semibold text-xl">Telegram</div>
                    <div class="text-zinc-400 text-sm">@porqueen</div>
                </div>
                <i class="fa-solid fa-arrow-right text-purple-400 group-hover:translate-x-2 transition-transform"></i>
            </a>

            <!-- Discord -->
            <div onclick="copyDiscord()" class="social-card glass rounded-3xl p-5 flex items-center gap-5 group cursor-pointer" data-tilt>
                <div class="w-12 h-12 bg-[#5865F2] rounded-2xl flex items-center justify-center text-3xl text-white flex-shrink-0">
                    <i class="fa-brands fa-discord"></i>
                </div>
                <div class="flex-1">
                    <div class="font-semibold text-xl">Discord</div>
                    <div class="text-zinc-400 text-sm" id="discord-text">@dikaalonely</div>
                </div>
                <i class="fa-solid fa-copy text-purple-400 group-hover:scale-110 transition-transform"></i>
            </div>
        </div>

        <p class="text-center text-zinc-500 text-xs mt-12">made by dikatech</p>
    </div>

    <script>
        // 3D Tilt
        VanillaTilt.init(document.querySelectorAll("[data-tilt]"), {
            max: 12,
            speed: 400,
            glare: true,
            "max-glare": 0.5,
            perspective: 1200,
        });

        // Copy Discord
        function copyDiscord() {
            navigator.clipboard.writeText("dikaalonely").then(() => {
                const el = document.getElementById('discord-text');
                const original = el.textContent;
                el.textContent = "✅ Copied!";
                el.classList.add('!text-green-400');
                setTimeout(() => {
                    el.textContent = original;
                    el.classList.remove('!text-green-400');
                }, 2000);
            });
        }
    </script>
</body>
</html>
