<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3K Dikatech — Liquid Future</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #00eaff;
      --accent-glow: 0 0 40px rgba(0, 234, 255, 0.5);
      --text: #f0f8ff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; font-family:'Inter', sans-serif; background:#000; color:var(--text); }

    #ui-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4.5rem, 12vw, 12rem);
      background: linear-gradient(90deg, #00eaff, #a78bfa, #ff4da6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: var(--accent-glow);
      margin-bottom: 1.5rem;
      animation: pulse 8s infinite alternate;
    }

    p.tagline {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      max-width: 900px;
      opacity: 0.9;
      margin-bottom: 3rem;
      line-height: 1.5;
    }

    .cta {
      pointer-events: auto;
      padding: 1.2rem 3.5rem;
      font-size: 1.4rem;
      font-weight: 600;
      background: linear-gradient(45deg, #00eaff, #0095ff);
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: var(--accent-glow);
      backdrop-filter: blur(12px);
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
    }

    .cta:hover {
      transform: translateY(-12px) scale(1.08);
      box-shadow: 0 25px 70px rgba(0,234,255,0.7);
    }

    #info {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes pulse {
      0%,100% { opacity: 0.92; }
      50% { opacity: 1; }
    }

    @media (max-width: 768px) {
      h1 { font-size: 6rem; }
      .cta { padding: 1rem 2.5rem; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div id="ui-overlay">
    <h1>3K DIKATECH</h1>
    <p class="tagline">Liquid Glass Reality — Engineered for Tomorrow's Legends</p>
    <button class="cta">Enter the Void</button>
  </div>

  <div id="info">Mouse drag to orbit • Scroll to zoom • Hollywood 2026 Vibes</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/OrbitControls.min.js"></script>

  <script>
    // ==================== CORE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000814);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 1.5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // balance fps & quality
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.6;
    controls.minDistance = 4;
    controls.maxDistance = 20;
    controls.enableZoom = true;

    // ==================== LIGHTING (Hollywood cinematic) ====================
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0x88ddff, 2.5);
    keyLight.position.set(5, 8, 5);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xff88cc, 1.8);
    rimLight.position.set(-6, 4, -3);
    scene.add(rimLight);

    // ==================== LIQUID GLASS MATERIAL (Frosted/Transparent Air) ====================
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      metalness: 0.05,
      roughness: 0.15,          // frosted / diffused look
      transmission: 0.95,       // high transparency + refraction
      thickness: 0.8,           // refraction strength
      ior: 1.45,                // realistic glass index
      clearcoat: 1.0,
      clearcoatRoughness: 0.1,
      envMapIntensity: 1.2,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.92
    });

    // ==================== 3D ELEMENTS ====================
    // Central floating orb (liquid glass core)
    const orbGeo = new THREE.SphereGeometry(1.8, 64, 64);
    const orb = new THREE.Mesh(orbGeo, glassMat);
    orb.position.y = 0.5;
    scene.add(orb);

    // Floating panels / cards (glassmorphism 3D)
    const panelGeo = new THREE.BoxGeometry(3.2, 1.8, 0.12);
    for (let i = 0; i < 5; i++) {
      const panel = new THREE.Mesh(panelGeo, glassMat);
      const angle = (i / 5) * Math.PI * 2;
      panel.position.set(
        Math.cos(angle) * 5,
        Math.sin(angle * 1.3) * 1.5 + 0.5,
        Math.sin(angle) * 5
      );
      panel.lookAt(0, panel.position.y, 0); // face center
      panel.rotation.z = Math.random() * 0.4 - 0.2;
      scene.add(panel);
    }

    // Subtle background particles (nebula/air feel)
    const particlesGeo = new THREE.BufferGeometry();
    const particlesCnt = 1200;
    const posArray = new Float32Array(particlesCnt * 3);
    for (let i = 0; i < particlesCnt * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 60;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMat = new THREE.PointsMaterial({
      size: 0.08,
      color: 0x88ddff,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // ==================== RESIZE HANDLER ====================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== ANIMATION LOOP (target smooth 120fps) ====================
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.008;

      // Gentle float + rotation
      orb.rotation.y += 0.002;
      orb.position.y = Math.sin(time * 0.6) * 0.4 + 0.5;

      particles.rotation.y += 0.0004;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Optional: subtle mouse parallax on UI (extra smooth feel)
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 0.04;
      const y = (e.clientY / window.innerHeight - 0.5) * 0.04;
      document.querySelector('h1').style.transform = `translate(${x*30}px, ${y*30}px)`;
    });
  </script>
</body>
</html>
